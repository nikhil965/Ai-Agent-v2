<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GHOST // FIELD TERMINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Black+Ops+One&family=Space+Mono:wght@400;700&display=swap');

  :root{
    --bg:#000000;
    --bg-panel:rgba(4,6,4,0.78);
    --bg-panel-solid:#050604;
    --line:rgba(90,120,80,0.28);
    --grn:#3ef26a;
    --grn-dim:#2a4a30;
    --grn-soft:rgba(62,242,106,0.07);
    --olive:#8a9a5b;
    --amber:#e0a83c;
    --rose:#e2483f;
    --text:#c9d6c4;
    --text-dim:#5c6a58;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; background:var(--bg); overflow:hidden; }
  body{
    font-family:'Share Tech Mono', monospace;
    color:var(--text);
  }
  ::selection{ background:rgba(62,242,106,0.28); }

  /* ---------- background layers ---------- */
  #grid{ position:fixed; inset:0; z-index:0; }
  #grid canvas{ display:block; width:100%; height:100%; }

  .noise-layer{
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(ellipse 60% 45% at 15% 10%, rgba(62,242,106,0.05), transparent 60%),
      radial-gradient(ellipse 50% 40% at 90% 90%, rgba(138,154,91,0.05), transparent 60%),
      repeating-linear-gradient(90deg, rgba(62,242,106,0.015) 0px, rgba(62,242,106,0.015) 1px, transparent 1px, transparent 48px),
      repeating-linear-gradient(0deg, rgba(62,242,106,0.015) 0px, rgba(62,242,106,0.015) 1px, transparent 1px, transparent 48px);
    pointer-events:none;
  }

  .scanlines{
    position:fixed; inset:0; z-index:5; pointer-events:none;
    background:repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.02) 0px,
      rgba(255,255,255,0.02) 1px,
      transparent 1px,
      transparent 3px
    );
    mix-blend-mode:overlay;
    opacity:0.55;
  }

  .vignette{
    position:fixed; inset:0; z-index:4; pointer-events:none;
    background:radial-gradient(ellipse 120% 100% at 50% 50%, transparent 40%, rgba(0,0,0,0.8) 100%);
  }

  /* ---------- layout ---------- */
  .wrap{
    position:relative; z-index:2;
    height:100vh;
    display:flex;
    flex-direction:column;
    padding:18px;
    gap:0;
  }

  .titlebar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    border:1px solid var(--line);
    padding:11px 18px;
    background:var(--bg-panel);
    backdrop-filter:blur(8px);
    font-family:'Black Ops One', sans-serif;
    font-size:13px;
    letter-spacing:3px;
    color:var(--grn-dim);
    border-radius:2px 2px 0 0;
  }
  .titlebar .brand{
    color:var(--grn);
    font-weight:400;
    text-shadow:0 0 10px rgba(62,242,106,0.45);
    position:relative;
  }
  .titlebar .brand::after{
    content:'▚ GHOST // FIELD TERMINAL';
    position:absolute; left:0; top:0;
    color:var(--amber);
    opacity:0;
    clip-path:inset(0 0 0 0);
    animation:glitch 7s infinite;
  }
  @keyframes glitch{
    0%,96%,100%{ opacity:0; transform:translate(0,0); }
    97%{ opacity:0.7; transform:translate(-1.5px,0.5px); clip-path:inset(20% 0 60% 0); }
    98%{ opacity:0.5; transform:translate(1.5px,-0.5px); clip-path:inset(60% 0 10% 0); }
  }
  .titlebar .status{ display:flex; align-items:center; gap:9px; color:var(--olive); font-family:'Space Mono', monospace; font-size:11px; letter-spacing:1px; }
  .pulse{ width:8px; height:8px; border-radius:1px; background:var(--grn); box-shadow:0 0 8px var(--grn), 0 0 16px rgba(62,242,106,0.4); animation:blink 1.8s infinite; }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:.3;} }

  .main{
    flex:1;
    display:flex;
    min-height:0;
    border:1px solid var(--line);
    border-top:none;
    border-radius:0 0 2px 2px;
    overflow:hidden;
    box-shadow:0 0 60px rgba(0,0,0,0.5) inset;
  }

  .term{
    flex:1;
    background:var(--bg-panel);
    backdrop-filter:blur(8px);
    display:flex;
    flex-direction:column;
    min-height:0;
    min-width:0;
    border-right:1px solid var(--line);
  }

  .log{
    flex:1;
    overflow-y:auto;
    padding:20px 22px;
    font-size:13.5px;
    line-height:1.75;
  }
  .log::-webkit-scrollbar{ width:8px; }
  .log::-webkit-scrollbar-thumb{ background:var(--grn-dim); border-radius:4px; }
  .log::-webkit-scrollbar-track{ background:transparent; }

  .line{ white-space:pre-wrap; word-break:break-word; margin-bottom:5px; opacity:0; animation:fadein 0.35s ease forwards; }
  @keyframes fadein{ from{ opacity:0; transform:translateY(3px); } to{ opacity:1; transform:translateY(0); } }
  .tag{ color:var(--grn-dim); }
  .you .tag{ color:var(--amber); }
  .agent{ color:var(--text); }
  .agent .tag{ color:var(--grn); text-shadow:0 0 6px rgba(62,242,106,0.4); }
  .tool{ color:var(--olive); font-size:12.5px; padding-left:18px; opacity:0.85; }
  .tool .name{ color:var(--amber); }
  .err{ color:var(--rose); }
  .boot{ color:var(--grn-dim); }

  .inputbar{
    border-top:1px solid var(--line);
    display:flex;
    align-items:center;
    padding:13px 18px;
    gap:10px;
  }
  .prompt{ color:var(--amber); font-size:13.5px; white-space:nowrap; font-family:'Black Ops One', sans-serif; }
  .inputbar input{
    flex:1;
    background:var(--grn-soft);
    border:1px solid var(--grn-dim);
    border-radius:2px;
    outline:none;
    color:var(--grn);
    font-family:inherit;
    font-size:13.5px;
    caret-color:var(--grn);
    padding:9px 11px;
    transition:box-shadow 0.2s, border-color 0.2s;
  }
  .inputbar input:focus{
    border-color:var(--grn);
    box-shadow:0 0 0 3px rgba(62,242,106,0.12), 0 0 16px rgba(62,242,106,0.15);
  }
  .inputbar input::placeholder{ color:rgba(62,242,106,0.3); }
  .sendbtn{
    background:linear-gradient(135deg, rgba(62,242,106,0.14), rgba(138,154,91,0.14));
    border:1px solid var(--grn);
    color:var(--grn);
    font-family:'Black Ops One', sans-serif;
    font-size:11px;
    letter-spacing:1.5px;
    padding:10px 18px;
    border-radius:2px;
    cursor:pointer;
    transition:box-shadow 0.2s, transform 0.1s;
  }
  .sendbtn:hover{ box-shadow:0 0 16px rgba(62,242,106,0.45); }
  .sendbtn:active{ transform:scale(0.96); }

  /* ---------- HUD side panel ---------- */
  .hud{
    width:230px;
    flex-shrink:0;
    background:var(--bg-panel-solid);
    display:flex;
    flex-direction:column;
    padding:18px 16px;
    gap:18px;
    overflow-y:auto;
  }
  .hud-label{
    font-family:'Black Ops One', sans-serif;
    font-size:9.5px;
    letter-spacing:2px;
    color:var(--text-dim);
    margin-bottom:8px;
  }

  .radar{
    position:relative;
    width:100%;
    aspect-ratio:1;
    border-radius:2px;
    border:1px solid var(--line);
    background:
      repeating-linear-gradient(90deg, rgba(62,242,106,0.05) 0px, rgba(62,242,106,0.05) 1px, transparent 1px, transparent 14px),
      repeating-linear-gradient(0deg, rgba(62,242,106,0.05) 0px, rgba(62,242,106,0.05) 1px, transparent 1px, transparent 14px),
      radial-gradient(circle, rgba(62,242,106,0.05) 0%, transparent 70%);
    overflow:hidden;
  }
  .radar::before, .radar::after{
    content:'';
    position:absolute; inset:22%;
    border:1px solid var(--line);
    border-radius:50%;
  }
  .radar::after{ inset:42%; }
  .radar-cross{
    position:absolute; inset:0;
  }
  .radar-cross span{
    position:absolute;
    background:var(--line);
  }
  .radar-cross span:nth-child(1){ top:50%; left:0; right:0; height:1px; }
  .radar-cross span:nth-child(2){ left:50%; top:0; bottom:0; width:1px; }
  .radar-sweep{
    position:absolute; inset:0;
    border-radius:50%;
    background:conic-gradient(from 0deg, rgba(62,242,106,0.32), transparent 30%);
    animation:sweep 4s linear infinite;
  }
  @keyframes sweep{ to{ transform:rotate(360deg); } }
  .blip{
    position:absolute;
    width:5px; height:5px;
    border-radius:1px;
    background:var(--amber);
    box-shadow:0 0 6px var(--amber);
    animation:blipfade 3s ease-in-out infinite;
  }
  @keyframes blipfade{ 0%,100%{ opacity:0.2; } 50%{ opacity:1; } }

  .telemetry{ display:flex; flex-direction:column; gap:10px; font-size:11.5px; }
  .tele-row{ display:flex; justify-content:space-between; color:var(--text-dim); }
  .tele-row .val{ color:var(--grn); }

  .bars{ display:flex; gap:3px; align-items:flex-end; height:16px; }
  .bars span{
    width:4px;
    background:var(--grn-dim);
    border-radius:1px;
    animation:barwave 1.6s ease-in-out infinite;
  }
  .bars span:nth-child(1){ height:40%; animation-delay:0s; }
  .bars span:nth-child(2){ height:70%; animation-delay:0.15s; }
  .bars span:nth-child(3){ height:100%; animation-delay:0.3s; background:var(--grn); }
  .bars span:nth-child(4){ height:65%; animation-delay:0.45s; }
  .bars span:nth-child(5){ height:30%; animation-delay:0.6s; }
  @keyframes barwave{ 0%,100%{ transform:scaleY(0.6); opacity:0.6; } 50%{ transform:scaleY(1); opacity:1; } }

  .divider{ height:1px; background:var(--line); }

  .memlog{ font-size:10.5px; color:var(--text-dim); display:flex; flex-direction:column; gap:5px; }
  .memlog .entry{ padding-left:10px; position:relative; }
  .memlog .entry::before{ content:'»'; position:absolute; left:0; color:var(--grn-dim); }

  .footer{
    position:relative; z-index:2;
    font-size:10px;
    color:var(--grn-dim);
    padding:9px 6px 0;
    display:flex;
    justify-content:space-between;
    letter-spacing:1px;
    font-family:'Black Ops One', sans-serif;
  }

  @media (max-width: 720px){
    .hud{ display:none; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition:none !important; }
  }
</style>
</head>
<body>
<div id="grid"><canvas id="gridCanvas"></canvas></div>
<div class="noise-layer"></div>
<div class="scanlines"></div>
<div class="vignette"></div>

<div class="wrap">

  <div class="titlebar">
    <div class="brand">▚ GHOST // FIELD TERMINAL</div>
    <div class="status"><span class="pulse"></span>SECURE LINK</div>
  </div>

  <div class="main">
    <div class="term">
      <div class="log" id="log"></div>
      <div class="inputbar">
        <span class="prompt">&gt;</span>
        <input id="input" type="text" placeholder="enter transmission..." autocomplete="off" />
        <button class="sendbtn" id="sendBtn">SEND</button>
      </div>
    </div>

    <div class="hud">
      <div>
        <div class="hud-label">SIGNAL INTERCEPT</div>
        <div class="radar">
          <div class="radar-cross"><span></span><span></span></div>
          <div class="radar-sweep"></div>
          <div class="blip" id="blip1" style="top:30%; left:62%;"></div>
          <div class="blip" id="blip2" style="top:66%; left:38%; animation-delay:1s;"></div>
        </div>
      </div>

      <div class="divider"></div>

      <div>
        <div class="hud-label">SYSTEM STATUS</div>
        <div class="telemetry">
          <div class="tele-row"><span>SIGNAL</span><span class="bars"><span></span><span></span><span></span><span></span><span></span></span></div>
          <div class="tele-row"><span>LATENCY</span><span class="val" id="latency">--ms</span></div>
          <div class="tele-row"><span>LOG NODES</span><span class="val" id="memCount">0</span></div>
          <div class="tele-row"><span>UPLINK</span><span class="val" id="uplinkState">IDLE</span></div>
        </div>
      </div>

      <div class="divider"></div>

      <div>
        <div class="hud-label">COMMS LOG</div>
        <div class="memlog" id="memlog">
          <div class="entry">awaiting first contact</div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <span id="endpointLabel">CHANNEL: /chat</span>
    <span id="clock"></span>
  </div>

</div>

<script>
// tactical grid background — faint scan sweep, no starfield
(function(){
  const canvas = document.getElementById('gridCanvas');
  const ctx = canvas.getContext('2d');
  let w, h, t = 0;

  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function draw(){
    ctx.clearRect(0,0,w,h);
    t += 0.6;

    // slow horizontal scan band
    const bandY = (t % (h + 200)) - 100;
    const grad = ctx.createLinearGradient(0, bandY - 60, 0, bandY + 60);
    grad.addColorStop(0, 'rgba(62,242,106,0)');
    grad.addColorStop(0.5, 'rgba(62,242,106,0.035)');
    grad.addColorStop(1, 'rgba(62,242,106,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, bandY - 60, w, 120);

    requestAnimationFrame(draw);
  }
  draw();
})();

// ---------- CONFIG ----------
const API_ENDPOINT = "/chat";

const log = document.getElementById('log');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const clock = document.getElementById('clock');
const latencyEl = document.getElementById('latency');
const memCountEl = document.getElementById('memCount');
const uplinkStateEl = document.getElementById('uplinkState');
const memlogEl = document.getElementById('memlog');

let memCount = 0;
let memEntriesShown = false;

function ts(){ return new Date().toTimeString().slice(0,8); }

function appendLine(html){
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = html;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

function you(text){
  appendLine(`<span class="you"><span class="tag">[${ts()}] OPERATOR ~$</span> ${escapeHtml(text)}</span>`);
}
function agent(text){
  appendLine(`<span class="agent"><span class="tag">[${ts()}] GHOST ~$</span> ${escapeHtml(text)}</span>`);
}
function toolStep(name, detail){
  appendLine(`<span class="tool">  ↳ <span class="name">${escapeHtml(name)}</span>${detail ? ' :: ' + escapeHtml(detail) : ''}</span>`);
}
function errLine(text){
  appendLine(`<span class="err">[${ts()}] ALERT :: ${escapeHtml(text)}</span>`);
}
function escapeHtml(s){
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function logMemEntry(text){
  if(!memEntriesShown){
    memlogEl.innerHTML = '';
    memEntriesShown = true;
  }
  const div = document.createElement('div');
  div.className = 'entry';
  div.textContent = text.length > 30 ? text.slice(0,30) + '…' : text;
  memlogEl.appendChild(div);
  while(memlogEl.children.length > 4){
    memlogEl.removeChild(memlogEl.firstChild);
  }
}

const bootLines = [
  "▚ establishing secure channel ...",
  "▚ loading config.py ................ OK",
  "▚ loading memory.py ................ OK",
  "▚ loading tools.py .................. OK",
  "▚ loading prompts.py ................ OK",
  "▚ syncing llm backend .............. OK",
  "▚ launching agent.py ................ OK",
  ""
];

async function boot(){
  for(const l of bootLines){
    appendLine(`<span class="boot">${l}</span>`);
    await sleep(90);
  }
  agent("systems nominal. standing by, operator.");
}
function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }

async function sendMessage(){
  const text = input.value.trim();
  if(!text) return;
  you(text);
  input.value = "";
  logMemEntry(text);
  memCount++;
  memCountEl.textContent = memCount;
  uplinkStateEl.textContent = "ACTIVE";
  uplinkStateEl.style.color = "var(--amber)";

  toolStep("uplink", "transmitting to agent runtime");

  const startTime = performance.now();

  try{
    const res = await fetch(API_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });
    if(!res.ok) throw new Error(`server responded ${res.status}`);

    let data;
    const raw = await res.text();
    try{ data = JSON.parse(raw); } catch(e){ data = { response: raw }; }

    latencyEl.textContent = Math.round(performance.now() - startTime) + "ms";

    if(Array.isArray(data.trace)){
      for(const step of data.trace){
        toolStep(step.tool || "tool", step.detail || "");
        await sleep(120);
      }
    }
    agent(data.response || data.output || raw || "(empty response)");
    uplinkStateEl.textContent = "IDLE";
    uplinkStateEl.style.color = "var(--grn)";

  } catch(err){
    latencyEl.textContent = "--ms";
    errLine(err.message + " — is app.py running and reachable at " + API_ENDPOINT + "?");
    agent("uplink lost. switching to offline simulation.");
    uplinkStateEl.textContent = "OFFLINE";
    uplinkStateEl.style.color = "var(--rose)";
    demoEcho(text);
  }
}

function demoEcho(text){
  toolStep("parser.py", "parsed intent (sim)");
  toolStep("memory.py", "no relevant context found (sim)");
  setTimeout(()=> agent(`[sim mode] received: "${text}" — connect app.py for a live response.`), 250);
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') sendMessage(); });

function tickClock(){
  clock.textContent = new Date().toTimeString().slice(0,8) + " :: GRID " + (100 + Math.floor(Math.random()*900));
}
setInterval(tickClock, 1000);
tickClock();

boot();
input.focus();
</script>
</body>
</html>
