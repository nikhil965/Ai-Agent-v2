<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AGENT // MISSION CONTROL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Orbitron:wght@500;700;900&display=swap');

  :root{
    --bg:#03060f;
    --bg-panel:rgba(8,14,32,0.62);
    --bg-panel-solid:#080e20;
    --line:rgba(120,180,220,0.22);
    --cyan:#5fe7ff;
    --cyan-dim:#2c6a86;
    --cyan-soft:rgba(95,231,255,0.09);
    --violet:#a78bfa;
    --amber:#ffb84d;
    --rose:#ff6b81;
    --text:#dcecfb;
    --text-dim:#7691ab;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; background:var(--bg); overflow:hidden; }
  body{
    font-family:'Space Mono', monospace;
    color:var(--text);
  }
  ::selection{ background:rgba(95,231,255,0.3); }

  /* ---------- background layers ---------- */
  #stars{ position:fixed; inset:0; z-index:0; }
  #stars canvas{ display:block; width:100%; height:100%; }

  .nebula{
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(ellipse 55% 40% at 12% 8%, rgba(167,139,250,0.14), transparent 60%),
      radial-gradient(ellipse 45% 35% at 92% 88%, rgba(95,231,255,0.10), transparent 60%),
      radial-gradient(ellipse 70% 60% at 50% 100%, rgba(44,106,134,0.10), transparent 70%);
    pointer-events:none;
  }

  .scanlines{
    position:fixed; inset:0; z-index:5; pointer-events:none;
    background:repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.018) 0px,
      rgba(255,255,255,0.018) 1px,
      transparent 1px,
      transparent 3px
    );
    mix-blend-mode:overlay;
    opacity:0.5;
  }

  .vignette{
    position:fixed; inset:0; z-index:4; pointer-events:none;
    background:radial-gradient(ellipse 120% 100% at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);
  }

  /* ---------- layout ---------- */
  .wrap{
    position:relative; z-index:2;
    height:100vh;
    display:flex;
    flex-direction:column;
    padding:18px;
    gap:0;
  }

  .titlebar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    border:1px solid var(--line);
    padding:11px 18px;
    background:var(--bg-panel);
    backdrop-filter:blur(8px);
    font-family:'Orbitron', sans-serif;
    font-size:12px;
    letter-spacing:2.5px;
    color:var(--cyan-dim);
    border-radius:8px 8px 0 0;
  }
  .titlebar .brand{
    color:var(--cyan);
    font-weight:700;
    text-shadow:0 0 12px rgba(95,231,255,0.55);
    position:relative;
  }
  .titlebar .brand::after{
    content:'✦ AGENT // MISSION CONTROL';
    position:absolute; left:0; top:0;
    color:var(--violet);
    opacity:0;
    clip-path:inset(0 0 0 0);
    animation:glitch 7s infinite;
  }
  @keyframes glitch{
    0%,96%,100%{ opacity:0; transform:translate(0,0); }
    97%{ opacity:0.7; transform:translate(-1.5px,0.5px); clip-path:inset(20% 0 60% 0); }
    98%{ opacity:0.5; transform:translate(1.5px,-0.5px); clip-path:inset(60% 0 10% 0); }
  }
  .titlebar .status{ display:flex; align-items:center; gap:9px; color:var(--violet); }
  .pulse{ width:8px; height:8px; border-radius:50%; background:var(--cyan); box-shadow:0 0 10px var(--cyan), 0 0 20px var(--cyan); animation:blink 1.8s infinite; }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:.3;} }

  .main{
    flex:1;
    display:flex;
    min-height:0;
    border:1px solid var(--line);
    border-top:none;
    border-radius:0 0 8px 8px;
    overflow:hidden;
    box-shadow:0 0 60px rgba(95,231,255,0.05) inset;
  }

  .term{
    flex:1;
    background:var(--bg-panel);
    backdrop-filter:blur(8px);
    display:flex;
    flex-direction:column;
    min-height:0;
    min-width:0;
    border-right:1px solid var(--line);
  }

  .log{
    flex:1;
    overflow-y:auto;
    padding:20px 22px;
    font-size:13.5px;
    line-height:1.75;
  }
  .log::-webkit-scrollbar{ width:8px; }
  .log::-webkit-scrollbar-thumb{ background:var(--cyan-dim); border-radius:4px; }
  .log::-webkit-scrollbar-track{ background:transparent; }

  .line{ white-space:pre-wrap; word-break:break-word; margin-bottom:5px; opacity:0; animation:fadein 0.35s ease forwards; }
  @keyframes fadein{ from{ opacity:0; transform:translateY(3px); } to{ opacity:1; transform:translateY(0); } }
  .tag{ color:var(--cyan-dim); }
  .you .tag{ color:var(--amber); }
  .agent{ color:var(--text); }
  .agent .tag{ color:var(--cyan); text-shadow:0 0 6px rgba(95,231,255,0.5); }
  .tool{ color:var(--violet); font-size:12.5px; padding-left:18px; opacity:0.8; }
  .tool .name{ color:var(--amber); }
  .err{ color:var(--rose); }
  .boot{ color:var(--cyan-dim); }

  .inputbar{
    border-top:1px solid var(--line);
    display:flex;
    align-items:center;
    padding:13px 18px;
    gap:10px;
  }
  .prompt{ color:var(--amber); font-size:13.5px; white-space:nowrap; font-family:'Orbitron', sans-serif; }
  .inputbar input{
    flex:1;
    background:var(--cyan-soft);
    border:1px solid var(--cyan-dim);
    border-radius:5px;
    outline:none;
    color:var(--cyan);
    font-family:inherit;
    font-size:13.5px;
    caret-color:var(--cyan);
    padding:9px 11px;
    transition:box-shadow 0.2s, border-color 0.2s;
  }
  .inputbar input:focus{
    border-color:var(--cyan);
    box-shadow:0 0 0 3px rgba(95,231,255,0.12), 0 0 16px rgba(95,231,255,0.15);
  }
  .inputbar input::placeholder{ color:rgba(95,231,255,0.32); }
  .sendbtn{
    background:linear-gradient(135deg, rgba(95,231,255,0.16), rgba(167,139,250,0.16));
    border:1px solid var(--cyan);
    color:var(--cyan);
    font-family:'Orbitron', sans-serif;
    font-size:11px;
    letter-spacing:1.5px;
    padding:10px 18px;
    border-radius:5px;
    cursor:pointer;
    transition:box-shadow 0.2s, transform 0.1s;
  }
  .sendbtn:hover{ box-shadow:0 0 16px rgba(95,231,255,0.45); }
  .sendbtn:active{ transform:scale(0.96); }

  /* ---------- HUD side panel (signature element) ---------- */
  .hud{
    width:230px;
    flex-shrink:0;
    background:var(--bg-panel-solid);
    display:flex;
    flex-direction:column;
    padding:18px 16px;
    gap:18px;
    overflow-y:auto;
  }
  .hud-label{
    font-family:'Orbitron', sans-serif;
    font-size:9.5px;
    letter-spacing:2px;
    color:var(--text-dim);
    margin-bottom:8px;
  }

  .radar{
    position:relative;
    width:100%;
    aspect-ratio:1;
    border-radius:50%;
    border:1px solid var(--line);
    background:radial-gradient(circle, rgba(95,231,255,0.04) 0%, transparent 70%);
    overflow:hidden;
  }
  .radar::before, .radar::after{
    content:'';
    position:absolute; inset:22%;
    border:1px solid var(--line);
    border-radius:50%;
  }
  .radar::after{ inset:42%; }
  .radar-cross{
    position:absolute; inset:0;
  }
  .radar-cross span{
    position:absolute;
    background:var(--line);
  }
  .radar-cross span:nth-child(1){ top:50%; left:0; right:0; height:1px; }
  .radar-cross span:nth-child(2){ left:50%; top:0; bottom:0; width:1px; }
  .radar-sweep{
    position:absolute; inset:0;
    border-radius:50%;
    background:conic-gradient(from 0deg, rgba(95,231,255,0.35), transparent 30%);
    animation:sweep 4s linear infinite;
  }
  @keyframes sweep{ to{ transform:rotate(360deg); } }
  .blip{
    position:absolute;
    width:5px; height:5px;
    border-radius:50%;
    background:var(--amber);
    box-shadow:0 0 6px var(--amber);
    animation:blipfade 3s ease-in-out infinite;
  }
  @keyframes blipfade{ 0%,100%{ opacity:0.2; } 50%{ opacity:1; } }

  .telemetry{ display:flex; flex-direction:column; gap:10px; font-size:11.5px; }
  .tele-row{ display:flex; justify-content:space-between; color:var(--text-dim); }
  .tele-row .val{ color:var(--cyan); }

  .bars{ display:flex; gap:3px; align-items:flex-end; height:16px; }
  .bars span{
    width:4px;
    background:var(--cyan-dim);
    border-radius:1px;
    animation:barwave 1.6s ease-in-out infinite;
  }
  .bars span:nth-child(1){ height:40%; animation-delay:0s; }
  .bars span:nth-child(2){ height:70%; animation-delay:0.15s; }
  .bars span:nth-child(3){ height:100%; animation-delay:0.3s; background:var(--cyan); }
  .bars span:nth-child(4){ height:65%; animation-delay:0.45s; }
  .bars span:nth-child(5){ height:30%; animation-delay:0.6s; }
  @keyframes barwave{ 0%,100%{ transform:scaleY(0.6); opacity:0.6; } 50%{ transform:scaleY(1); opacity:1; } }

  .divider{ height:1px; background:var(--line); }

  .memlog{ font-size:10.5px; color:var(--text-dim); display:flex; flex-direction:column; gap:5px; }
  .memlog .entry{ padding-left:10px; position:relative; }
  .memlog .entry::before{ content:'·'; position:absolute; left:0; color:var(--cyan-dim); }

  .footer{
    position:relative; z-index:2;
    font-size:10px;
    color:var(--cyan-dim);
    padding:9px 6px 0;
    display:flex;
    justify-content:space-between;
    letter-spacing:1px;
    font-family:'Orbitron', sans-serif;
  }

  @media (max-width: 720px){
    .hud{ display:none; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition:none !important; }
  }
</style>
</head>
<body>
<div id="stars"><canvas id="starsCanvas"></canvas></div>
<div class="nebula"></div>
<div class="scanlines"></div>
<div class="vignette"></div>

<div class="wrap">

  <div class="titlebar">
    <div class="brand">✦ AGENT // MISSION CONTROL</div>
    <div class="status"><span class="pulse"></span>ORBIT LOCKED</div>
  </div>

  <div class="main">
    <div class="term">
      <div class="log" id="log"></div>
      <div class="inputbar">
        <span class="prompt">&gt;</span>
        <input id="input" type="text" placeholder="transmit a message to the agent..." autocomplete="off" />
        <button class="sendbtn" id="sendBtn">TRANSMIT</button>
      </div>
    </div>

    <div class="hud">
      <div>
        <div class="hud-label">CONTACT RADAR</div>
        <div class="radar">
          <div class="radar-cross"><span></span><span></span></div>
          <div class="radar-sweep"></div>
          <div class="blip" id="blip1" style="top:30%; left:62%;"></div>
          <div class="blip" id="blip2" style="top:66%; left:38%; animation-delay:1s;"></div>
        </div>
      </div>

      <div class="divider"></div>

      <div>
        <div class="hud-label">TELEMETRY</div>
        <div class="telemetry">
          <div class="tele-row"><span>SIGNAL</span><span class="bars"><span></span><span></span><span></span><span></span><span></span></span></div>
          <div class="tele-row"><span>LATENCY</span><span class="val" id="latency">--ms</span></div>
          <div class="tele-row"><span>MEM NODES</span><span class="val" id="memCount">0</span></div>
          <div class="tele-row"><span>UPLINK</span><span class="val" id="uplinkState">IDLE</span></div>
        </div>
      </div>

      <div class="divider"></div>

      <div>
        <div class="hud-label">RECENT TRANSMISSIONS</div>
        <div class="memlog" id="memlog">
          <div class="entry">awaiting first contact</div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <span id="endpointLabel">SIGNAL: /chat</span>
    <span id="clock"></span>
  </div>

</div>

<script>
// starfield background — two depth layers with drift + occasional shooting star
(function(){
  const canvas = document.getElementById('starsCanvas');
  const ctx = canvas.getContext('2d');
  let w, h, stars = [], shooting = [];

  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  for(let i=0;i<200;i++){
    stars.push({
      x: Math.random()*w,
      y: Math.random()*h,
      r: Math.random()*1.4 + 0.3,
      s: Math.random()*0.4 + 0.1,
      tw: Math.random()*Math.PI*2
    });
  }

  function maybeSpawnShootingStar(){
    if(Math.random() < 0.0035 && shooting.length < 2){
      const x = Math.random()*w*0.6;
      shooting.push({ x, y: Math.random()*h*0.3, vx: 6+Math.random()*4, vy: 3+Math.random()*2, life: 1 });
    }
  }

  function draw(){
    ctx.clearRect(0,0,w,h);
    for(const st of stars){
      st.tw += 0.02;
      const alpha = 0.35 + Math.sin(st.tw)*0.4;
      ctx.beginPath();
      ctx.arc(st.x, st.y, st.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(220,236,251,${alpha})`;
      ctx.fill();
      st.y += st.s;
      if(st.y > h){ st.y = 0; st.x = Math.random()*w; }
    }

    maybeSpawnShootingStar();
    shooting.forEach(sh=>{
      ctx.beginPath();
      const grad = ctx.createLinearGradient(sh.x, sh.y, sh.x - sh.vx*8, sh.y - sh.vy*8);
      grad.addColorStop(0, `rgba(95,231,255,${sh.life})`);
      grad.addColorStop(1, 'rgba(95,231,255,0)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.4;
      ctx.moveTo(sh.x, sh.y);
      ctx.lineTo(sh.x - sh.vx*8, sh.y - sh.vy*8);
      ctx.stroke();
      sh.x += sh.vx; sh.y += sh.vy; sh.life -= 0.02;
    });
    shooting = shooting.filter(sh => sh.life > 0 && sh.x < w+50 && sh.y < h+50);

    requestAnimationFrame(draw);
  }
  draw();
})();

// ---------- CONFIG ----------
const API_ENDPOINT = "/chat";

const log = document.getElementById('log');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const clock = document.getElementById('clock');
const latencyEl = document.getElementById('latency');
const memCountEl = document.getElementById('memCount');
const uplinkStateEl = document.getElementById('uplinkState');
const memlogEl = document.getElementById('memlog');

let memCount = 0;
let memEntriesShown = false;

function ts(){ return new Date().toTimeString().slice(0,8); }

function appendLine(html){
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = html;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}

function you(text){
  appendLine(`<span class="you"><span class="tag">[${ts()}] COMMANDER ~$</span> ${escapeHtml(text)}</span>`);
}
function agent(text){
  appendLine(`<span class="agent"><span class="tag">[${ts()}] AGENT ~$</span> ${escapeHtml(text)}</span>`);
}
function toolStep(name, detail){
  appendLine(`<span class="tool">  ↳ <span class="name">${escapeHtml(name)}</span>${detail ? ' :: ' + escapeHtml(detail) : ''}</span>`);
}
function errLine(text){
  appendLine(`<span class="err">[${ts()}] ALERT :: ${escapeHtml(text)}</span>`);
}
function escapeHtml(s){
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function logMemEntry(text){
  if(!memEntriesShown){
    memlogEl.innerHTML = '';
    memEntriesShown = true;
  }
  const div = document.createElement('div');
  div.className = 'entry';
  div.textContent = text.length > 30 ? text.slice(0,30) + '…' : text;
  memlogEl.appendChild(div);
  while(memlogEl.children.length > 4){
    memlogEl.removeChild(memlogEl.firstChild);
  }
}

const bootLines = [
  "⟡ initializing propulsion core ...",
  "⟡ loading config.py ................ OK",
  "⟡ loading memory.py ................ OK",
  "⟡ loading tools.py .................. OK",
  "⟡ loading prompts.py ................ OK",
  "⟡ syncing llm backend .............. OK",
  "⟡ launching agent.py ................ OK",
  ""
];

async function boot(){
  for(const l of bootLines){
    appendLine(`<span class="boot">${l}</span>`);
    await sleep(90);
  }
  agent("systems nominal. transmit your message, commander.");
}
function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }

async function sendMessage(){
  const text = input.value.trim();
  if(!text) return;
  you(text);
  input.value = "";
  logMemEntry(text);
  memCount++;
  memCountEl.textContent = memCount;
  uplinkStateEl.textContent = "ACTIVE";
  uplinkStateEl.style.color = "var(--amber)";

  toolStep("uplink", "transmitting to agent runtime");

  const startTime = performance.now();

  try{
    const res = await fetch(API_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });
    if(!res.ok) throw new Error(`server responded ${res.status}`);

    let data;
    const raw = await res.text();
    try{ data = JSON.parse(raw); } catch(e){ data = { response: raw }; }

    latencyEl.textContent = Math.round(performance.now() - startTime) + "ms";

    if(Array.isArray(data.trace)){
      for(const step of data.trace){
        toolStep(step.tool || "tool", step.detail || "");
        await sleep(120);
      }
    }
    agent(data.response || data.output || raw || "(empty response)");
    uplinkStateEl.textContent = "IDLE";
    uplinkStateEl.style.color = "var(--cyan)";

  } catch(err){
    latencyEl.textContent = "--ms";
    errLine(err.message + " — is app.py running and reachable at " + API_ENDPOINT + "?");
    agent("uplink lost. switching to offline simulation.");
    uplinkStateEl.textContent = "OFFLINE";
    uplinkStateEl.style.color = "var(--rose)";
    demoEcho(text);
  }
}

function demoEcho(text){
  toolStep("parser.py", "parsed intent (sim)");
  toolStep("memory.py", "no relevant context found (sim)");
  setTimeout(()=> agent(`[sim mode] received: "${text}" — connect app.py for a live response.`), 250);
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') sendMessage(); });

function tickClock(){
  clock.textContent = new Date().toTimeString().slice(0,8) + " :: SECTOR " + (100 + Math.floor(Math.random()*900));
}
setInterval(tickClock, 1000);
tickClock();

boot();
input.focus();
</script>
</body>
</html>
